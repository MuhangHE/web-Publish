eq____&quot;^15logseq____&quot;,[152,logseq____&quot;^17logseq____&quot;,true,536870919]],[logseq____&quot;^15logseq____&quot;,[152,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u67144cb9-89be-4418-9430-63173263bcc0logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^Klogseq____&quot;,1729383609491,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^Nlogseq____&quot;,20240909,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^@logseq____&quot;,true,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^Ylogseq____&quot;,logseq____&quot;sep 9th, 2024logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^11logseq____&quot;,logseq____&quot;Sep 9th, 2024logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^Blogseq____&quot;,1729383609491,536870919]],[logseq____&quot;^15logseq____&quot;,[154,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u67144cb9-e420-49b7-b24f-b3700d202629logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Qlogseq____&quot;,logseq____&quot;听《日落大道》让我回忆起去年十一月。当时是申请季，也是大四上学期，因为信息闭塞以及高昂的中介费，再加之当时我也总觉得自己花时间花心思就能搞定申请，决定完全DIY申请。但是终归是自己能力不足，内核不稳，也过分高估自律和行动力，申请季造成的后遗症损害远远超过这段折磨本身的价值。\\n      申请季让我学到了什么？吃一堑长一智，人要懂得吸纳教训。我妈妈给我总结说，我做事前太过意气，并未考虑周全便冒然抉择。她说因为我心思单纯为人善良云云，我当这是她幻想出来的理由，毕竟是亲儿子。但是真正分析原因，大概有这几点，相互交织最终促成了我决定出国。首先出国这件事情，在我在我心中是遥远且不可及的，我心里也从来没有给自己真正预设过这一条道路，我的家庭背景和社交圈已经让我认同了出国是属于别人的，我安稳保研就行。\\n      就像大人都给小孩说将来要考清华，但是周围人又没有一个人考上过清华，所以考清华就只是口号花瓶，甚至花瓶还不如，它就不是一个切实的梦想，在重复过多的希冀中，考清华成为了一种标志，变成了戏谑，在不断被加强的不可能认同中而不会被认真考虑。它是爸爸说的，妈妈说的，电视报纸里都在说的那个蓝图。在刚进入大学时候，让我出国，比癞蛤蟆想吃天鹅肉还不如，我只知道那是天鹅肉，但是过分遥远。\\n      其次当时和故人正恋爱一年有余，我和故人有这两届之差，所以我们俩本校保研直博是长久安稳的无敌上策。正是因为有两年之差必定会来到一个毕业选择点，所以我和故人曾经，是很经常严肃又负责的聊到未来几年是出国或保研这件事情（后来感情变质也不认真考虑此类和未来相关的负责话题了），我也在和故人的交谈中，得知故人有出国打算。现在回想，这个打算就是蝴蝶效应的起始点之一，当然原因是交织的。当我得知故人有出国的心理之后，我是被扰动的。故人的这个打算造成了几点影响，第一让我意识到出国离我并不是一件很远的事情--故人在当时和我彼此亲密，因此故人是和我交心里面第一个要出国的；第二故人本身要出国的这个心思就让我一部分认为不是衷心的事情（这个想法是不对的）。第三，我想到四年后我为爱保研，然后故人却出国，有种道不明的滋味。但是单纯这些扰动并不足以冲破我潜意识里“出国”的屏障。所以在很长的一段时间里，我还是决定留在国内，安稳保研就好，事业爱情都收获。\\n    从这之中到大三下这段时间里，故人对于出国的态度一直在发生变化，一会儿说要保研和我留在国内，一会儿说保不上研还是出国。这种摇摆让我留在国内的想法又些许动摇，但是也不足以促成我决定出国，只是徒增我的烦恼罢了。\\n      大三下这段时间里，我正在做一门叫做“科创”的科研课程，这个项目我没有接受到指导，实验数据也稀烂，导师也时常pua，我可以说是啥也不会，让我们进行心脏配准、自己处理医学图象数据，搭建深度学习框架，最后再做配准算法的工作，给我造成了不少精神压力，浪费了我大把的时间，让我时常思考继续读博还是早点找个躺平工作，无论怎样，国内导师给我留下的印象就不太行，我太怕又遇到类似的科研经历。我处于不成熟的混沌时期，我甚至准备和图书馆老师打好关系之后直接图书馆就业，为此我还紧急写了入党申请书参加了积极分子培训。我不知道我最后要干什么，我害怕科研得不到指导。\\n      五月份我在想选择哪一位导师，于是就约了柳学长聊天，当晚得知郭遥老师没有直博名额，也得知研究生的高学费，他也劝我可以出国看看，他本身也很后悔没有出国。 郭遥导师是我本科遇到的为数不多的对学生很好，组里氛围也很好，实验室产出也很高，同时我也在他实验室做了两年科研。我深刻认为在他这里是非常美好的选择。\\n   于是直博名额的缺少以及较高昂的研究生费用，对于未知导师的实验室不确定性，再加上故人带给我的扰动--背叛、希望，汇聚成了一股力，让我说出了我要出国这句话，这种短时间观念的突发转变让我产生了很大的盲目自信，有一种积压过久突然解脱束缚，这种解脱竟然如此轻松，有一种向死而生的快感-- 我甚至说出如果选择一条稳定的路那样子太不酷的话。我像是完成了人生打卡，廉价的满足感背后实质上是不成熟选择，以及一切都更加不可控。\\n      那么这次选择后，由于我本身内核的不稳定，家庭教育中的缺陷，以及我自身目光短浅，这次选择后的惩罚就是让这些劣质品质的后果深刻的作用于我 -- 我失去了什么呢？\\n      申请让我对父母失去了分享欲，也加速了我和故人感情的破裂，我的精神状态和行为能力也从此下滑。我在申请期间状态不稳定，无论是最开始套瓷老师，许久无人回复，再到后来焦虑等待结果。我饥不择食发了许多邮件，没有经验，当时以为发出去之后很快就能得到回应，没想到经常是石沉大海，于是午睡得迷迷糊糊一半会起来打开手机看邮件，睡觉也梦到老师回复，一次午休能在梦到套瓷和迷糊查看邮件翻来覆去好几次，神魂颠倒的，所以有时候是醒了发现根本没有邮件，也有时候看到没有邮件才想起来只是梦到有回复而已，晃晃度日。过了几天在电脑面前突然弹出来香港城市大学一位导师的积极回复，还约了面试。我当时在书房非常开心，又看到了盼头，马上给我妈妈说香港城市大学有导师约我面试，我其实只是想分享我愉快的心情罢了。但是妈妈却一点也没有高兴，却说道：香港城市大学这个学校不如交大，不行。这个回答是完全在我意料之外，扫兴至极。其实我知道他们不支持我出国，不然那种出国不属于我的潜意识宿命感也不会根入我的脑子里。当时在办公室签放弃保研资格的时候，办公室老师给我说你真的想好了吗，你爸爸刚刚打电话问还有没有别的推免接受机会。如果我的家庭能够在这件事情上坚定的支持我的话，我所受到的精神折磨会少很多。后来离考研还有三个月的时候，我给我爹解释出国和保研不能同时进行，他竟然想到了让我考研和申请同时进行，我只当是他不了解这两者的冲突罢和过分相信我吧。申请我也做出了妥协，他们不让我申请美国（出于安全），所以我只申请了香港。我不选择英国和澳大利亚的原因是因为这俩很难很难本科全奖，所以相比之下香港离家近，有全奖，缺点是就五个学校。\\n      去年九月份签完放弃保研字之后，我突然畏缩出国，真的到了安稳之路和一条未知之路的抉择口时，我低劣的本性还是向安稳滑去，不过为时已晚。放弃签字第二天，发现我们学院一位教授有名额，我联系教务处说我能不能反悔签字，被骂了一顿，遂罢，程序错误。放弃签字第二周，工程硕博名额下来，我们学院一位教授很想要我，程序上这个和保研推免资格分开，放弃保研的同学如果愿意，可以参加该项目，不愿意的还需要继续签订不参与工程硕博的文件。可没曾想到生物医学工程学院教务处急着母慈子孝，根本没有处理这件事情，电院的老师周三晚收到教育部通知，在周四开始通知学生此事，生怕耽误同学，而生物医学工程学院的教授甚至直到周五中午都不知道工程硕博项目的通知已经下发。我一开始是如同拿到后悔药一样，抓着救命稻草求爷告奶给学院教务处打电话，告诉按照流程这个是需要我签字确认放弃资格的，我是有资格参与工程硕博项目。结果教务处主任已一句自求多福结束电话。机会来了，又没了，我被告知又有机会留下来，却又无奈天不时地不利人不和。\\n      从那时起，我就把朋友圈给关闭了，我看到朋友们保研祝贺时只会觉得我离这一天太远，现在我也很少再打开朋友圈。一天晚上我和故人在植物园小路上聊天，我把这段时间的经历告诉了她，她尝试安慰我无果后，对我说，“你爱怎么办怎么办吧”。\\n      九月份，我常常盯着天花板，听见窗外孤独的汽车鸣笛、行人衣物的摩擦窸窣、闷闷钝滞的心跳声，彻夜无眠。精神状态已经呆滞，外界的刺激对于我而言没有太多响应，希望的消失亦或是突来的变故，我已经麻木得从容。按照自己预定计划，按部就班，不以物喜，不以己悲。\\n      去年十一月份我得到了香港理工大学的教授比较肯定的答复，我对计算脑神经科学也有兴趣，这老师引用量破万，领域内也是大牛牛，我心想这几个月的痛苦折磨终于结束了，也算是满意的结果，颇有迎接新开始的精气神。我在地铁站给我妈妈打了视频电话，在电话里把这个好消息告诉了她，她却是说香港理工大学排名不如交大云云，无论是我给她解释了很多这个老师很厉害，读博不能只看学校排名等因素，她始终觉得这个结果不好。所以我拿到港理工的申请结果后没有开心很久，我觉得如此值得开心的事情，却没有得到家里人的支持。\\n      在大四上那段时间里，我的精神状态就是如此，饥不择食地给天南海北的教授发着一封又一封邮件，涣散焦虑机械地刷着信箱，修改文书，奔走资料，准备面试，夜晚思量得失，茫然无措的度日。有希望又失去，心绪也没人可以交流，一些人交浅言深不合时宜，关系好点的却又不甚关心你，说多了就像祥林嫂，免不得被人唾弃一句爱怎么办怎么办，给家庭不报忧愁，但有好消息他们也不满意。\\n     日复一日的在包玉刚图书馆里忙碌着，忙碌能减轻些许压力，让不太踏实的心稍微得到慰藉。到了晚上，深感疲乏，也就装好电脑，走下楼梯，步出馆外，思源湖边三三两两，下院和研究所间人群来来往往，哈啰单车的声音稀疏响起，坩锅蜷在石狮子旁揣着白手套。耳机中响起了《日落大道》，十一月秋风渐冷，我站在台阶上，心绪惆怅，馆外的轻松气氛让我心生无限羡慕，我觉得太难熬，反复问起自己这一切是否值得。“**每当黄昏阳光把所有的渲染，我看到夜的黑暗**。”这首歌听的我心口一酸，我想拥有回头再看这一切的从容。\\n    我的精神状态也让我和故人的关系变得更加糟糕，我和故人也因为这之间所暴露的问题以及即将要到来的异地而分手。\\n    现在我背着书包走出KSL图书馆，等着校车，我在草坪外来回踱步，刚结束了第一次组会，正在为明天的生理学课程发愁。此时耳机又随机播放到了《日落大道》，我的思绪瞬间被拉回那个痛苦的申请季。不禁感慨万千，此情此景，好似命中注定，像是宿命在向我对话，这一切的惩罚可以到此为止。当时不成熟的抉择让这一年里都伴随着动荡，如今只身万里，好坏都很难再及身，不如一笑泯之，重新开始。#周记logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Flogseq____&quot;,154,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Xlogseq____&quot;,154,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Vlogseq____&quot;,154,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Ulogseq____&quot;,95,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Ulogseq____&quot;,154,536870919]],[logseq____&quot;^15logseq____&quot;,[155,logseq____&quot;^Hlogseq____&quot;,95,53687091 徒步半小时前往学校，路上倒是见不到一个人影，真要有一个人迎面走来，却又心头紧张 -- 这些走在路上黑哥哥们总是一股异味，要不就是大热天全身遮盖完全，走路也双手揣兜，耸着肩一上一下的晃过来，要不就是枯瘦得很，像脏牛肉干一样 -- 总之这半小时让我不甚爽。教室内我就如同盖上白布的尸体一般，人来人往，字字语句的震颤都通过这白布到达我，我偏是不明白，好似这语言的最小颗粒度我尚未对齐，无法分辨其中有关于语气、幽默、情绪的各种人情细节。这尸体下课又回光返照，灰溜溜地起身徒步半小时到公寓。到公寓通常就饿了，饿也懒得做饭，吃根蛋白棒也就骗过了无脑的胃。我这人没有回忆温馨的能力，打小就是。小时候不敢一个人睡觉，闭上眼就感觉妖魔鬼怪全出来了，脚上一块皮痒痒，便是恶鬼在挠你，门外什么些微动静，兴许就是厉鬼来索命，反正不能闭眼，闭眼他们都来了。这分床小事儿折磨了我爹妈几年，到最后成为了我和我爹睡一房间，我妈睡一房间的格局 -- 几年努力，让他们分床成功了。我爹当时告诉我说，睡不着就想想开心的事情，想一会儿就睡着了。我没有成功过，只有羡慕他们这种幸福中睡着的能力。我想着我这人或许是个贱人，平日里心情尚好时不曾想过开心的事情，到自闭时畅忆往期时，回忆里相关的人又很难联系上，至觉这回忆更反差出此时窘困难熬之境，便更不愿回忆那些开心事。上周便是在这种心境中过去的，把以前那些儿事儿全想了一遍，还真温故而知新，知新后真想去说声抱歉，只怕别人觉得过分突兀，于事无补更填霜。也罢。\\n和沂和俊骐聊完之后，心情好了许多。从沂那儿也明白了，在身处糟糕的时候，就随他消耗空间和时间罢，一味要求坚强或许能奏效，但是会忽略到自己最真实的感受，要照顾好内心的脆弱，去感受此事此刻的情绪。倒也不是只顾自己的情绪，事态好转后若是稍加思考和总结，兴许就能避免下一次再次进入相同的模式，也可规避了再次步入同一河流的错误。我以前碰到他人遇到情绪障碍，大多都是不能理解，觉得自我坚强扛过去就足够，却从没有说出：“无论背后的原因是什么，在这一刻，在当下这个时候你需要给你时间和空间，这是我们需要证实的事实，而且这并不是什么要被批评要被质疑的不好的问题”如此温暖又有力量的话。如今意识到这类问题，希望不要太晚，就像沂所说的那样“犯错于反省就像痛苦摸索中前进，好过一辈子原地踏步的人”。#周记logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Ologseq____&quot;,logseq____&quot;^16logseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Flogseq____&quot;,160,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Xlogseq____&quot;,160,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Vlogseq____&quot;,160,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Ulogseq____&quot;,95,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Ulogseq____&quot;,160,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^Hlogseq____&quot;,95,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^17logseq____&quot;,true,536870919]],[logseq____&quot;^15logseq____&quot;,[161,logseq____&quot;^;logseq____&quot;,logseq____&quot;~u67144cb9-24c8-4ea4-96e2-873b503ff75dlogseq____&quot;,536870919]],[logseq____&quot;^15logseq____&quot;,[162,logseq____&quot;^Qlog       // This script checks to see if a redirect is present in the query string

      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.

      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};

          });

              l.hash
            );
